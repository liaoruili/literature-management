version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: literature_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-literature_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - literature_network

  # Redis for Celery
  redis:
    image: redis:7-alpine
    container_name: literature_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - literature_network

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend.simple
      args:
        - HTTP_PROXY=http://172.10.0.15:7890
        - HTTPS_PROXY=http://172.10.0.15:7890
        - http_proxy=http://172.10.0.15:7890
        - https_proxy=http://172.10.0.15:7890
    container_name: literature_backend
    env_file:
      - ../backend/.env
    environment:
      POSTGRES_HOST: postgres
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - pdf_storage:/data/pdfs
      - export_storage:/data/exports
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - literature_network

  # Celery Worker (optional - comment out for now)
  # celery_worker:
  #   build:
  #     context: ../backend
  #     dockerfile: ../docker/Dockerfile.backend.simple
  #   container_name: literature_celery
  #   command: celery -A app.tasks.celery_app worker --loglevel=info
  #   env_file:
  #     - ../backend/.env
  #   environment:
  #     POSTGRES_HOST: postgres
  #     CELERY_BROKER_URL: redis://redis:6379/0
  #     CELERY_RESULT_BACKEND: redis://redis:6379/0
  #   volumes:
  #     - pdf_storage:/data/pdfs
  #     - export_storage:/data/exports
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   networks:
  #     - literature_network

  # Celery Beat (optional - comment out for now)
  # celery_beat:
  #   build:
  #     context: ../backend
  #     dockerfile: ../docker/Dockerfile.backend.simple
  #   container_name: literature_celery_beat
  #   command: celery -A app.tasks.celery_app beat --loglevel=info
  #   env_file:
  #     - ../backend/.env
  #   environment:
  #     POSTGRES_HOST: postgres
  #     CELERY_BROKER_URL: redis://redis:6379/0
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   networks:
  #     - literature_network

  # Frontend (optional - can be built separately)
  # frontend:
  #   build:
  #     context: ../frontend
  #     dockerfile: ../docker/Dockerfile.frontend
  #   container_name: literature_frontend
  #   ports:
  #     - "${FRONTEND_PORT:-3000}:80"
  #   depends_on:
  #     - backend
  #   networks:
  #     - literature_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pdf_storage:
    driver: local
  export_storage:
    driver: local

networks:
  literature_network:
    driver: bridge
